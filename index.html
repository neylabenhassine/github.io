<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PIX-X Creative Agency</title>
<link rel="icon" type="image/x-icon" href="PIX-X-ICON.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Golos+Text:wght@400..900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body { width: 100%; height: 100%; font-family: 'Golos Text', Arial, sans-serif; }

  main {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: clamp(80px, 8vh, 200px);
    width: 100%;
    min-height: 100vh;
    padding: clamp(40px, 5vw, 64px);
    background-size: cover;
    background-position: center;
    background-color: #0e0e0e;
  }

  .headline {
    font-size: clamp(3rem, 10vw, 8rem);
    font-weight: 900;
    color: #ACE59E;
    letter-spacing: 0.02em;
    text-transform: uppercase;
    text-align: center;
    line-height: 0.85;
  }

  .subtitle {
    font-size: clamp(0.95rem, 2.5vw, 2rem);
    color: #464646;
    text-align: center;
    line-height: 1.4;
    max-width: 520px;
  }

  .subtitle em {
    font-style: italic;
    font-weight: 700;
  }

  .uppertext {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: clamp(16px, 3vh, 32px);
  }

  .card {
    width: clamp(140px, 30vw, 200px);
    height: clamp(140px, 30vw, 200px);
    background: linear-gradient(135deg, #ACE59E 0%, #FAF1E2 100%);
    border-radius: clamp(1.5rem, 4vw, 3rem);
    display: flex;
    align-items: center;
    justify-content: center;
    will-change: transform;
    transform-style: preserve-3d;
    box-shadow: 0 40px 80px rgba(0,0,0,0.18), 0 8px 24px rgba(0,0,0,0.10);
  }

  .logo-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    will-change: transform;
  }

  .logo-img {
    width: clamp(70px, 15vw, 120px);
    object-fit: contain;
    display: block;
  }

  .footer-text {
    font-size: clamp(0.85rem, 2vw, 2rem);
    color: #464646;
    text-align: center;
    line-height: 1.4;
    display: flex;
    flex-direction: column;
    gap: clamp(8px, 2vh, 16px);
  }

  .footer-text em {
    font-style: italic;
    font-weight: 700;
    display: block;
  }

  .footer-text a {
    color: #464646;
    text-decoration: none;
  }

  .footer-text a:hover {
    color: #2C2C2C;
  }

  /* tablet */
  @media (max-width: 768px) {
    .headline br { display: none; }
    .subtitle br { display: none; }
  }

  /* mobile */
  @media (max-width: 480px) {
    main { justify-content: space-evenly; }
  }
</style>
</head>
<body>
<main>

  <div class="uppertext">
    <h1 class="headline">Almost <br> Ready.</h1>
    <p class="subtitle">
      We're building something to help you <em>grow</em>, <br> and <em>we're nearly there.</em>
    </p>
  </div>

  <div class="card">
    <div class="logo-wrap">
      <img class="logo-img" src="PIX-X-LOGO.svg" alt="PIX-X Logo"/>
    </div>
  </div>

  <div class="footer-text">
    <div>
      Can't wait? Reach out.
      <em>Let's start now.</em>
    </div>
    <a href="mailto:contact@pix-x.com">Contact@pix-x.com</a>
  </div>

</main>

<script>
  const main = document.querySelector("main");
  const card = document.querySelector(".card");
  const logoWrap = document.querySelector(".logo-wrap");

  gsap.set("main", { perspective: 650 });

  const cardRX = gsap.quickTo(card, "rotationX", { ease: "power3", duration: 0.6 });
  const cardRY = gsap.quickTo(card, "rotationY", { ease: "power3", duration: 0.6 });
  const innerX = gsap.quickTo(logoWrap, "x", { ease: "power3", duration: 0.6 });
  const innerY = gsap.quickTo(logoWrap, "y", { ease: "power3", duration: 0.6 });

  main.addEventListener("pointermove", (e) => {
    const nx = e.clientX / window.innerWidth;
    const ny = e.clientY / window.innerHeight;
    cardRX(gsap.utils.interpolate(15, -15, ny));
    cardRY(gsap.utils.interpolate(-15, 15, nx));
    innerX(gsap.utils.interpolate(-20, 20, nx));
    innerY(gsap.utils.interpolate(-20, 20, ny));
  });

  main.addEventListener("pointerleave", () => {
    cardRX(0); cardRY(0);
    innerX(0); innerY(0);
  });
</script>
</body>
</html>
